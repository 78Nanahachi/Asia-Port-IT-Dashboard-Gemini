<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia-Port-IT-Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  /* 背景色を確実に適用 */
  html, body {
    background-color: #0f172a !important; 
    color: #f8fafc;
    margin: 0;
    padding: 0;
    font-family: sans-serif;
  }
  header { background: #1e293b; padding: 20px; border-bottom: 1px solid #475569; }
  .debug-info {
    background: #450a0a;
    color: #fecaca;
    padding: 15px;
    margin: 20px;
    border: 1px solid #dc2626;
    border-radius: 8px;
    font-family: monospace;
    font-size: 12px;
    display: none; /* エラー時のみ表示 */
  }
  .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .kpi-card { background: #1e293b; padding: 20px; border-radius: 10px; border-top: 4px solid #38bdf8; }
  #map { height: 400px; border-radius: 10px; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; font-size: 12px; }
  th, td { padding: 10px; border: 1px solid #334155; text-align: left; }
  th { background: #334155; }
</style>
</head>
<body>

<header>
  <h1>Asia-Port-IT-Dashboard</h1>
  <div id="status">システム起動中...</div>
</header>

<div id="debugBox" class="debug-info"></div>

<div class="container">
  <div class="kpi-grid">
    <div class="kpi-card"><div>ニュース総数</div><div id="count" style="font-size:30px;">--</div></div>
    <div id="catBox" class="kpi-card"><div>最新ニュース</div><div id="latest" style="font-size:14px; margin-top:10px;">--</div></div>
  </div>

  <div id="map"></div>

  <div style="background:#1e293b; padding:15px; border-radius:10px; overflow-x:auto;">
    <h3>📊 最新データ一覧</h3>
    <table id="dataTable">
      <thead>
        <tr><th>日付</th><th>場所</th><th>タイトル</th><th>リンク</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
// --- 設定項目 ---
const SPREADSHEET_ID = '1jGre5314DttRSk2_xXVlFc0XxgroxKJMOVonhSTaLu0';
// シート名が「LIST」でない場合、ここを「シート1」や「Sheet1」に変えてみてください
const SHEET_NAME = 'LIST'; 

const debugBox = document.getElementById('debugBox');
const status = document.getElementById('status');

function showError(msg) {
  debugBox.style.display = 'block';
  debugBox.innerHTML += `<div>⚠️ ${msg}</div>`;
  status.textContent = "エラーが発生しました";
}

async function start() {
  try {
    status.textContent = "データ取得中...";
    
    // スプレッドシート取得用URL
    // SHEET_NAMEを使わず、一番左のタブ（gid=0）を直接指定する方式に変更
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
    
    const response = await fetch(url);
    if (!response.ok) throw new Error("Googleへの接続に失敗しました");
    
    const text = await response.text();
    // Googleの特殊なJSON形式を解析
    const jsonData = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
    
    const rows = jsonData.table.rows;
    const cols = jsonData.table.cols.map(c => c.label);
    
    if (!rows || rows.length === 0) {
      showError("スプレッドシートの中にデータが見つかりません。");
      return;
    }

    status.textContent = "データ処理中...";
    document.getElementById('count').textContent = rows.length + " 件";

    const tbody = document.querySelector('#dataTable tbody');
    
    // データのマッピングと表示
    rows.forEach((row, index) => {
      const d = row.c;
      // 列の順番を想定: 0:日付, 1:場所, 2:緯度, 3:経度, 4:タイトル, 5:要約, 6:カテゴリ, 7:LINK
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${d[0] ? d[0].f || d[0].v : ''}</td>
        <td>${d[1] ? d[1].v : ''}</td>
        <td>${d[4] ? d[4].v : ''}</td>
        <td><a href="${d[7] ? d[7].v : '#'}" target="_blank" style="color:#38bdf8">Link</a></td>
      `;
      tbody.appendChild(tr);
    });

    // 最新ニュースのタイトルを表示
    if(rows[0] && rows[0].c[4]) {
      document.getElementById('latest').textContent = rows[0].c[4].v;
    }

    // 地図の初期化
    const map = L.map('map').setView([20, 120], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    rows.forEach(row => {
      const d = row.c;
      const lat = d[2] ? parseFloat(d[2].v) : null;
      const lng = d[3] ? parseFloat(d[3].v) : null;
      if (lat && lng) {
        L.marker([lat, lng]).addTo(map).bindPopup(d[4] ? d[4].v : "Port IT News");
      }
    });

    status.textContent = "更新完了: " + new Date().toLocaleTimeString();

  } catch (err) {
    showError(err.message);
    console.error(err);
  }
}

// 実行
start();
</script>
</body>
</html>
