<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia-Port-IT-Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #2dd4bf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px 32px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-top: 4px solid var(--accent); }
  .kpi-value { font-size: 32px; font-weight: 700; font-family: 'DM Mono'; color: var(--accent); }
  .viz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 32px 24px; }
  #map { height: 400px; background: var(--surface2); border-radius: 12px; border: 1px solid var(--border); }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: bold; background: rgba(255,255,255,0.02); }
  .table-wrapper { padding: 0 32px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; font-size: 13px; }
  th { text-align: left; padding: 12px; background: var(--surface2); color: var(--text-muted); }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  .error-msg { background: #ef4444; color: white; padding: 20px; margin: 32px; border-radius: 8px; display: none; }
  @media (max-width: 900px) { .viz-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div>
    <h1 id="mainTitle">Asia-Port-IT-Dashboard</h1>
    <p style="font-size: 11px; color: var(--text-muted);">Port Technology & Logistics News Monitoring</p>
  </div>
  <div id="status" style="font-size: 12px; color: var(--accent2);">Loading Data...</div>
</header>

<div id="errorMessage" class="error-msg"></div>

<div class="kpi-grid">
  <div class="kpi-card">
    <div style="font-size:11px; color:var(--text-muted);">TOTAL NEWS</div>
    <div class="kpi-value" id="kpiTotal">0</div>
  </div>
  <div class="kpi-card" style="border-top-color: var(--accent2);">
    <div style="font-size:11px; color:var(--text-muted);">DX / AUTOMATION</div>
    <div class="kpi-value" id="kpiDX">0</div>
  </div>
</div>

<div class="viz-grid">
  <div class="panel">
    <div class="panel-header">🗺 NEWS LOCATIONS</div>
    <div id="map"></div>
  </div>
  <div class="panel">
    <div class="panel-header">📊 TOP CATEGORIES</div>
    <div style="padding:20px; height:340px;">
      <canvas id="categoryChart"></canvas>
    </div>
  </div>
</div>

<div class="table-wrapper">
  <div class="panel">
    <div class="panel-header">📋 RECENT NEWS FEED</div>
    <div style="overflow-x:auto; max-height:500px;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Location</th>
            <th>Summary</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// 重要：スプレッドシートID
const SPREADSHEET_ID = '1jGre5314DttRSk2_xXVlFc0XxgroxKJMOVonhSTaLu0';
const SHEET_NAME = 'LIST'; 

async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    // JSONPの枠を外す処理
    const json = JSON.parse(text.replace(/^[^(]+[(]/, '').replace(/[)];?$/, ''));
    
    const cols = json.table.cols.map(c => c.label || '');
    const rows = json.table.rows.map(row => {
      let obj = {};
      row.c.forEach((cell, i) => {
        const key = cols[i] || `col_${i}`;
        obj[key] = cell ? (cell.f || cell.v || '') : '';
      });
      return obj;
    });
    return rows;
  } catch (e) {
    throw new Error("スプレッドシートの読み込みに失敗しました。共有設定を確認してください。");
  }
}

async function init() {
  const errorEl = document.getElementById('errorMessage');
  const statusEl = document.getElementById('status');

  try {
    const data = await loadData();
    if (!data || data.length === 0) throw new Error("データが見つかりません。");

    statusEl.textContent = "Last updated: " + new Date().toLocaleTimeString();

    // 1. KPIの表示
    document.getElementById('kpiTotal').textContent = data.length;
    const dxCount = data.filter(r => 
      (r['カテゴリ'] || '').includes('DX') || (r['カテゴリ'] || '').includes('自動化')
    ).length;
    document.getElementById('kpiDX').textContent = dxCount;

    // 2. テーブルの描画 (ユーザーの列名「配信日」「場所」「LINK」を使用)
    const tbody = document.getElementById('tableBody');
    data.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="white-space:nowrap;">${r['配信日'] || '—'}</td>
        <td><span style="color:var(--accent); font-weight:500;">${r['カテゴリ'] || 'IT'}</span></td>
        <td style="font-weight:bold;">${r['場所'] || 'Global'}</td>
        <td style="font-size:12px;">${(r['タイトル'] || r['要約'] || '—').substring(0, 100)}...</td>
        <td><a href="${r['LINK']}" target="_blank" style="color:var(--accent); text-decoration:none;">↗</a></td>
      `;
      tbody.appendChild(tr);
    });

    // 3. チャートの描画
    const catMap = {};
    data.forEach(r => {
      const c = r['カテゴリ'] || 'Other';
      catMap[c] = (catMap[c] || 0) + 1;
    });
    
    new Chart(document.getElementById('categoryChart'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(catMap),
        datasets: [{
          data: Object.values(catMap),
          backgroundColor: ['#38bdf8', '#2dd4bf', '#fbbf24', '#a78bfa', '#f472b6'],
          borderWidth: 0
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
    });

    // 4. マップの描画
    const map = L.map('map').setView([20, 120], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    data.forEach(r => {
      const lat = parseFloat(r['緯度']);
      const lng = parseFloat(r['経度']);
      if(!isNaN(lat) && !isNaN(lng)) {
        L.circleMarker([lat, lng], {
          radius: 8, color: '#38bdf8', fillColor: '#38bdf8', fillOpacity: 0.6, weight: 1
        }).addTo(map).bindPopup(`<b>${r['場所']}</b><br>${r['タイトル'] || ''}`);
      }
    });

  } catch (e) {
    statusEl.textContent = "Error";
    errorEl.style.display = 'block';
    errorEl.textContent = e.message;
    console.error(e);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
