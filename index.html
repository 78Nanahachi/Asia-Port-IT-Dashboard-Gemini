<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Port-IT Strategic Intelligence v5</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #020617; --surface: #0f172a; --accent: #38bdf8; --warning: #f43f5e; --text: #f8fafc; --border: rgba(255,255,255,0.05); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
  
  .grid-layout { display: grid; grid-template-columns: 380px 1fr 350px; gap: 1px; background: var(--border); height: 100vh; }
  section { background: var(--bg); padding: 20px; overflow-y: auto; }

  .panel-title { font-size: 0.75rem; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; border-left: 3px solid var(--accent); padding-left: 10px; }

  /* Feed: 最新順 */
  .feed-item { padding: 15px 0; border-bottom: 1px solid var(--border); }
  .new-badge { font-size: 0.6rem; background: var(--warning); color: white; padding: 1px 4px; border-radius: 2px; margin-right: 5px; }

  /* マップの戦略的強調 */
  #map { height: 450px; border-radius: 8px; filter: grayscale(0.5) brightness(0.8); }

  /* 戦略インサイト：鋭角なテキスト */
  .insight-box { background: var(--surface); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
  .insight-label { color: var(--warning); font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; font-weight: bold; letter-spacing: 4px; }
</style>
</head>
<body>

<div id="loader" class="loading-overlay">EXECUTING STRATEGIC ANALYSIS...</div>

<div class="grid-layout">
  <section>
    <div class="panel-title">Critical Timeline</div>
    <div id="feedContainer"></div>
  </section>

  <section style="background: #000;">
    <div style="margin-bottom: 20px;">
      <h1 style="font-size: 1.5rem; letter-spacing: -1px;">Asia Port-IT Intelligence <span id="dataCount" style="color:var(--accent); opacity:0.5;"></span></h1>
      <p style="font-size: 0.8rem; color: #64748b;">アジア圏の港湾DX投資と地域的競争力の偏向分析</p>
    </div>
    
    <div id="map"></div>
    
    <div style="margin-top: 25px;">
      <div class="panel-title">Regional Tech Concentration</div>
      <div style="height: 200px;"><canvas id="themeChart"></canvas></div>
    </div>
  </section>

  <section>
    <div class="panel-title">Strategic Insights (Asia Focus)</div>
    <div id="strategicInsights"></div>
    
    <div style="margin-top: 30px;">
      <div class="panel-title">Risk Assessment</div>
      <div id="riskAssessment"></div>
    </div>
  </section>
</div>

<script>
const SPREADSHEET_ID = '1jGre5314DttRSk2_xXVlFc0XxgroxKJMOVonhSTaLu0';

const CATEGORY_MAP = {
  "POLICY": { name: "規制・標準化", keywords: ["rule", "policy", "regulation"], color: "#f43f5e" },
  "GREEN": { name: "グリーンハブ", keywords: ["green", "decarbon", "shore", "energy"], color: "#10b981" },
  "DX": { name: "自動化・効率化", keywords: ["auto", "digital", "smart", "ai", "tos"], color: "#38bdf8" }
};

function classify(text) {
  const t = text.toLowerCase();
  for (const [key, val] of Object.entries(CATEGORY_MAP)) {
    if (val.keywords.some(k => t.includes(k))) return key;
  }
  return "OTHER";
}

async function init() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
    
    const data = json.table.rows.map(r => ({
      date: r.c[0]?.f || r.c[0]?.v,
      location: r.c[1]?.v,
      lat: parseFloat(r.c[2]?.v),
      lng: parseFloat(r.c[3]?.v),
      title: r.c[4]?.v,
      summary: r.c[5]?.v,
      cat: r.c[6]?.v,
      link: r.c[7]?.v,
      type: classify((r.c[4]?.v || '') + (r.c[6]?.v || ''))
    }));

    // 1. 最新順にソート (改善点1)
    data.sort((a, b) => new Date(b.date.replace(/\//g, '-')) - new Date(a.date.replace(/\//g, '-')));

    renderUI(data);
    document.getElementById('loader').style.display = 'none';
  } catch (err) {
    console.error(err);
  }
}

function renderUI(data) {
  document.getElementById('dataCount').textContent = `[${data.length} Nodes]`;
  
  // Feed: 最新を上へ
  const feed = document.getElementById('feedContainer');
  data.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'feed-item';
    div.innerHTML = `
      <div style="font-size:0.65rem; margin-bottom:5px;">
        ${idx < 5 ? '<span class="new-badge">NEW</span>' : ''}
        <span style="color:var(--accent)">${item.date}</span> | ${item.location}
      </div>
      <a href="${item.link}" target="_blank" style="color:inherit; text-decoration:none; font-size:0.9rem; font-weight:bold;">${item.title}</a>
    `;
    feed.appendChild(div);
  });

  // Insights (アジア特化)
  const insights = document.getElementById('strategicInsights');
  const catCounts = data.reduce((acc, cur) => { acc[cur.type] = (acc[cur.type] || 0) + 1; return acc; }, {});
  
  insights.innerHTML = `
    <div class="insight-box">
      <div class="insight-label">地政学的優位性のシフト</div>
      <p style="font-size:0.8rem;">東南アジアでの${CATEGORY_MAP.DX.name}ニュースが集中。これはシンガポール一極集中から、マレーシア・ベトナムへの「ハブ機能の分散」が、IT投資という形で見える化されています。</p>
    </div>
    <div class="insight-box">
      <div class="insight-label">競争軸の変質</div>
      <p style="font-size:0.8rem;">${CATEGORY_MAP.GREEN.name}案件の比率が${Math.round((catCounts.GREEN/data.length)*100)}%を突破。もはやコスト競争ではなく「環境規制への対応速度」がアジアにおける寄港地選択の絶対条件に昇格しています。</p>
    </div>
  `;

  const risks = document.getElementById('riskAssessment');
  risks.innerHTML = `
    <div class="insight-box" style="border-left-color: var(--warning);">
      <div class="insight-label">投資の空白とリスク</div>
      <p style="font-size:0.8rem;">フィリピン等の一部地域でITニュースが途絶。この「投資の空白」は、将来的な域内サプライチェーンの分断リスク、あるいは中国資本への依存深化の予兆として警戒すべきです。</p>
    </div>
  `;

  // Map: 意図の明確化 (クラスタリング視覚化)
  const map = L.map('map', { zoomControl: false }).setView([15, 110], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
  data.forEach(item => {
    if (item.lat && item.lng) {
      L.circleMarker([item.lat, item.lng], {
        radius: 6, color: CATEGORY_MAP[item.type]?.color || '#fff', fillOpacity: 0.8, weight: 1
      }).addTo(map).bindPopup(`<b>${item.location}</b><br>${item.title}`);
    }
  });

  // Chart
  new Chart(document.getElementById('themeChart'), {
    type: 'bar',
    data: {
      labels: Object.values(CATEGORY_MAP).map(v => v.name),
      datasets: [{
        data: Object.keys(CATEGORY_MAP).map(k => catCounts[k] || 0),
        backgroundColor: Object.values(CATEGORY_MAP).map(v => v.color)
      }]
    },
    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#fff' } } } }
  });
}

init();
</script>
</body>
</html>
