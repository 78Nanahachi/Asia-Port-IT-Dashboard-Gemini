<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maritime Strategic Intelligence - Asia Hub Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --warning: #fb7185; --text: #f8fafc; --border: rgba(255,255,255,0.1); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
  
  .dashboard-layout { display: grid; grid-template-columns: 400px 1fr 380px; height: 100vh; gap: 1px; background: var(--border); }
  section { background: var(--bg); padding: 20px; overflow-y: auto; }

  /* ニュースフィードの改善 */
  .panel-title { font-size: 0.8rem; font-weight: bold; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 12px; }
  .news-card { padding: 16px 0; border-bottom: 1px solid var(--border); transition: 0.2s; }
  .news-card:hover { background: rgba(255,255,255,0.02); }
  .news-date { font-size: 0.7rem; color: var(--accent); font-family: monospace; }
  .news-location { font-size: 0.7rem; color: #94a3b8; margin-left: 10px; }
  .news-link { display: block; font-size: 0.95rem; font-weight: bold; color: var(--text); text-decoration: none; margin: 6px 0; line-height: 1.4; }
  .news-link:hover { text-decoration: underline; color: var(--accent); }
  .news-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; background: #1e293b; color: var(--accent); }

  /* マップ */
  #map { height: 480px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }

  /* 戦略インサイト */
  .insight-item { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-top: 4px solid var(--accent); }
  .insight-label { color: var(--accent); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .insight-text { font-size: 0.85rem; line-height: 1.7; color: #cbd5e1; }
  .evidence-box { margin-top: 10px; padding-top: 10px; border-top: 1px dotted var(--border); font-size: 0.75rem; color: var(--accent); font-family: monospace; }

  .loading { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div id="loader" class="loading">
  <div style="font-size: 1.2rem; letter-spacing: 5px; color: var(--accent);">SYNCHRONIZING STRATEGIC DATA...</div>
</div>

<div class="dashboard-layout">
  <section>
    <div class="panel-title">Critical News Timeline</div>
    <div id="feedContainer"></div>
  </section>

  <section style="background: #000;">
    <div style="margin-bottom: 20px;">
      <h1 style="font-size: 1.6rem;">Asia Port-IT Intelligence Monitor</h1>
      <p style="font-size: 0.8rem; color: #64748b;">ハブ争奪戦におけるデジタル投資の偏向と地政学的相関分析</p>
    </div>
    <div id="map"></div>
    
    <div class="panel-title">Regional Investment Concentration</div>
    <div style="height: 220px;"><canvas id="techChart"></canvas></div>
  </section>

  <section>
    <div class="panel-title">Strategic Intelligence</div>
    <div id="insightsContainer"></div>
    
    <div class="panel-title">Risk Assessment</div>
    <div id="riskContainer"></div>
  </section>
</div>

<script>
const SPREADSHEET_ID = '1jGre5314DttRSk2_xXVlFc0XxgroxKJMOVonhSTaLu0';

// 戦略的分類の定義
const STRATEGIES = {
  GREEN: { name: "グリーンハブ戦略", color: "#10b981", keys: ["green", "decarbon", "shore", "energy", "zero", "環境"] },
  DIGITAL: { name: "自動化・DX競争", color: "#38bdf8", keys: ["auto", "digital", "smart", "ai", "tos", "情報システム"] },
  POL: { name: "規制・標準化", color: "#f43f5e", keys: ["rule", "policy", "regulation", "港湾計画"] }
};

function classify(item) {
  const text = (item.title + item.cat).toLowerCase();
  for (const [id, s] of Object.entries(STRATEGIES)) {
    if (s.keys.some(k => text.includes(k))) return id;
  }
  return "OTHER";
}

async function start() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf("(") + 1, text.lastIndexOf(")")));
    
    const data = json.table.rows.map(r => ({
      date: r.c[0]?.f || r.c[0]?.v,
      location: r.c[1]?.v,
      lat: parseFloat(r.c[2]?.v),
      lng: parseFloat(r.c[3]?.v),
      title: r.c[4]?.v,
      summary: r.c[5]?.v,
      cat: r.c[6]?.v,
      link: r.c[7]?.v
    })).filter(item => item.title); // タイトルのない行は除外

    // 最新順ソート
    data.sort((a, b) => new Date(b.date.replace(/\//g, '-')) - new Date(a.date.replace(/\//g, '-')));

    processAnalysis(data);
    document.getElementById('loader').style.display = 'none';
  } catch (err) {
    console.error(err);
    document.getElementById('loader').textContent = "DATA SYNC FAILED.";
  }
}

function processAnalysis(data) {
  const counts = { GREEN: 0, DIGITAL: 0, POL: 0, OTHER: 0 };
  const feed = document.getElementById('feedContainer');
  
  data.forEach(item => {
    const type = classify(item);
    counts[type]++;

    // Timeline Rendering
    const div = document.createElement('div');
    div.className = 'news-card';
    div.innerHTML = `
      <div class="news-date">${item.date}<span class="news-location">| ${item.location}</span></div>
      <a href="${item.link}" target="_blank" class="news-link">${item.title}</a>
      <span class="news-tag">${STRATEGIES[type]?.name || "一般ニュース"}</span>
    `;
    feed.appendChild(div);
  });

  // Insights Rendering (エビデンスベース)
  const insights = document.getElementById('insightsContainer');
  const greenRatio = Math.round((counts.GREEN / data.length) * 100);
  const digitalRatio = Math.round((counts.DIGITAL / data.length) * 100);

  insights.innerHTML = `
    <div class="insight-item">
      <span class="insight-label">海事脱炭素化の主導権争い</span>
      <p class="insight-text">アジア全域のITニュース中、${greenRatio}%が「グリーンハブ」に関連。これは単なる環境対応ではなく、欧州航路の結節点としての「寄港地選別」への強い危機感の現れです。</p>
      <div class="evidence-box">Evidence: n=${counts.GREEN} Green-focused projects identified.</div>
    </div>
    <div class="insight-item">
      <span class="insight-label">トランスシップメント・リスク</span>
      <p class="insight-text">マレーシア、ベトナムでの自動化(DX)投資が${digitalRatio}%。シンガポールの独走に対し、後発港がデジタルツイン等で「効率によるコスト削減」を狙う構図が鮮明になっています。</p>
      <div class="evidence-box">Evidence: ${digitalRatio}% news nodes correlate to Automation/TOS.</div>
    </div>
  `;

  document.getElementById('riskContainer').innerHTML = `
    <div class="insight-item" style="border-top-color: var(--warning);">
      <span class="insight-label">デジタル・サプライチェーンの分断</span>
      <p class="insight-text">フィリピン、インドネシアでのITニュースが相対的に過小。域内でのデジタル格差が、将来的にデータ連携（貿易プラットフォーム等）のボトルネックになる地政学的リスクが存在します。</p>
    </div>
  `;

  // Visualization
  renderMap(data);
  renderChart(counts);
}

function renderMap(data) {
  const map = L.map('map', { zoomControl: false }).setView([15, 110], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
  data.forEach(item => {
    if (item.lat && item.lng) {
      const type = classify(item);
      L.circleMarker([item.lat, item.lng], {
        radius: 6, color: STRATEGIES[type]?.color || '#fff', fillOpacity: 0.8, weight: 1
      }).addTo(map).bindPopup(`<b>${item.location}</b><br>${item.title}`);
    }
  });
}

function renderChart(counts) {
  new Chart(document.getElementById('techChart'), {
    type: 'bar',
    data: {
      labels: Object.values(STRATEGIES).map(s => s.name),
      datasets: [{
        data: [counts.GREEN, counts.DIGITAL, counts.POL],
        backgroundColor: Object.values(STRATEGIES).map(s => s.color)
      }]
    },
    options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#fff' } } } }
  });
}

start();
</script>
</body>
</html>
